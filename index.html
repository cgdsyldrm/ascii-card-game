<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cardminal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Enemy half ─────────────────────────────────────── -->
  <div id="enemy-panel">
    <div id="enemy-header">
      <span id="enemy-hp" class="crimson">♥ 20 HP  [ENEMY]</span>
      <span id="phase-label" class="amber">PHASE: Play cards</span>
      <span id="turn-num" class="dim">TURN 1</span>
    </div>
    <div id="ai-hand" class="dim">AI HAND: (empty)</div>
    <pre id="ai-board" class="board crimson-board">(empty)</pre>
  </div>

  <!-- ── VS divider ─────────────────────────────────────── -->
  <div id="vs-divider"><span>──────────────────── ⚔ ────────────────────</span></div>

  <!-- ── Player half ────────────────────────────────────── -->
  <div id="player-panel">
    <pre id="player-board" class="board">(empty)</pre>
    <div id="player-hand">YOUR HAND: (empty)</div>
    <div id="player-footer">
      <span id="player-hp">♥ 20 HP  [YOU]</span>
    </div>
  </div>

  <!-- ── Terminal log + input ───────────────────────────── -->
  <div id="terminal-panel">
    <div id="game-log"></div>
    <div id="cmd-line">
      <span class="prompt">$&gt;</span>
      <input id="cmd" type="text" autocomplete="off" spellcheck="false" autofocus>
    </div>
  </div>

  <!-- ── Game over overlay ──────────────────────────────── -->
  <div id="gameover-overlay">
    <div id="gameover-box">
      <div id="gameover-msg">YOU WIN</div>
      <div class="blink dim">[ PRESS ENTER TO PLAY AGAIN ]</div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
